<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Code Editor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background: rgba(15, 23, 42, 0.8);
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      padding: 25px;
      color: white;
    }
    
    .header h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }
    
    .header p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto;
      opacity: 0.9;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      max-width: 1400px;
      height: 75vh;
      width: 1000px;
      margin: 20px auto;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }
    
    @media (min-width: 900px) {
      .container {
        flex-direction: row;
      }
    }
    
    .editor-panel, .preview-panel {
      flex: 1;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .panel-header {
      background: #f5f7ff;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .panel-header h2 {
      font-size: 1.3rem;
      color: #4e54c8;
      margin: 0;
    }
    
    .circles {
      display: flex;
      margin-left: 15px;
    }
    
    .circle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-right: 8px;
    }
    
    .circle.red { background: #ff5f56; }
    .circle.yellow { background: #ffbd2e; }
    .circle.green { background: #27c93f; }
    
    .editor {
      width: 100%;
      height: 100%;
      padding: 20px;
      font-family: 'Fira Code', monospace;
      font-size: 16px;
      line-height: 1.5;
      border: none;
      resize: none;
      outline: none;
      background: #f8f9fa;
      color: #333;
    }
    
    .preview-container {
      flex: 1;
      padding: 0;
      position: relative;
      background: white;
      height: 100%;
    }
    
    #preview {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    
    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    
    .btn {
      padding: 14px 30px;
      background: white;
      color: #4e54c8;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }
    
    .btn.primary {
      background: #4e54c8;
      color: white;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }
    
    .btn.primary:hover {
      background: #3f44ae;
    }
    
    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      max-width: 1200px;
      margin: 40px auto;
    }
    
    .feature {
      background: rgba(255, 255, 255, 0.9);
      padding: 25px;
      border-radius: 12px;
      width: 250px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s;
    }
    
    .feature:hover {
      transform: translateY(-5px);
    }
    
    .feature i {
      font-size: 2.5rem;
      color: #4e54c8;
      margin-bottom: 15px;
    }
    
    .feature h3 {
      margin-bottom: 12px;
      color: #4e54c8;
    }
    
    footer {
      text-align: center;
      padding: 25px;
      color: white;
      margin-top: auto;
    }
    
    footer p {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Live Code Editor</h1>
    <p>Edit HTML code and see results in real-time</p>
  </div>
  
  <div class="container">
    <div class="editor-panel">
      <div class="panel-header">
        <h2>Code Editor</h2>
        <div class="circles">
          <div class="circle red"></div>
          <div class="circle yellow"></div>
          <div class="circle green"></div>
        </div>
      </div>
      <textarea class="editor" id="code" oninput="updatePreview()">
<!DOCTYPE html>
<html>
<head>
  <title>Hello World</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f0f2f5;
    }
    h1 {
      color: #4e54c8;
      margin-bottom: 20px;
    }
    p {
      color: #666;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Hello, World!</h1>
  <p>This is a basic HTML template.</p>
</body>
</html>
      </textarea>
    </div>
    
    <div class="preview-panel">
      <div class="panel-header">
        <h2>Live Preview</h2>
        <div class="circles">
          <div class="circle red"></div>
          <div class="circle yellow"></div>
          <div class="circle green"></div>
        </div>
      </div>
      <div class="preview-container">
        <iframe id="preview"></iframe>
      </div>
    </div>
  </div>
  
  <div class="buttons">
    <button class="btn primary">Run Code</button>
    <button class="btn">Reset</button>
    <button class="btn">Save</button>
  </div>
  
  <div class="features">
    <div class="feature">
      <i class="fas fa-code"></i>
      <h3>HTML5</h3>
      <p>Learn modern semantic HTML</p>
    </div>
    <div class="feature">
      <i class="fab fa-css3-alt"></i>
      <h3>CSS3</h3>
      <p>Style with latest CSS features</p>
    </div>
    <div class="feature">
      <i class="fas fa-mobile-alt"></i>
      <h3>Responsive</h3>
      <p>Create mobile-friendly designs</p>
    </div>
    <div class="feature">
      <i class="fas fa-bolt"></i>
      <h3>Fast</h3>
      <p>Real-time preview updates</p>
    </div>
  </div>
  
  <footer>
    <p>© 2023 Live Code Editor | Master Front-End Development</p>
  </footer>

  <script>
    function updatePreview() {
      const code = document.getElementById("code").value;
      const iframe = document.getElementById("preview");
      iframe.srcdoc = code;
    }
    
    // Load initial content
    updatePreview();
    
    // Add event listeners to buttons
    document.querySelector('.btn.primary').addEventListener('click', updatePreview);
    
    document.querySelectorAll('.btn')[1].addEventListener('click', function() {
      document.getElementById('code').value = `<!DOCTYPE html>
<html>
<head>
  <title>Hello World</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f0f2f5;
    }
    h1 {
      color: #4e54c8;
      margin-bottom: 20px;
    }
    p {
      color: #666;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Hello, World!</h1>
  <p>This is a basic HTML template.</p>
</body>
</html>`;
      updatePreview();
    });
    
    document.querySelectorAll('.btn')[2].addEventListener('click', function() {
      alert('Code saved successfully!');
    });
  </script>
</body>
</html>
